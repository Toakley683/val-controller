name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g., v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      # Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'

      # Install UPX
      - name: Install UPX
        run: |
          choco install upx -y
          upx --version

      # Install NSIS
      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      # Verify NSIS installation
      - name: Verify NSIS
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          makensis -VERSION

      # Install Wails CLI
      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          wails version

      # Get or Create Release
      - name: Get Release
        id: get_release
        uses: cardinalby/git-get-release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ github.event.inputs.tag_name || github.ref_name }}
          doNotFailIfNotFound: true

      - name: Create Release if Not Exists
        id: create_release
        if: steps.get_release.outputs.id == ''
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          release_name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          body: |
            Release ${{ github.event.inputs.tag_name || github.ref_name }}
            
            Built from commit: ${{ github.sha }}
            Build date: ${{ github.run_number }}
            Workflow: ${{ github.workflow }}

      # Set Release ID for subsequent steps
      - name: Set Release ID
        id: set_release_id
        run: |
          if ("${{ steps.get_release.outputs.id }}" -ne "") {
            $RELEASE_ID = "${{ steps.get_release.outputs.id }}"
          } else {
            $RELEASE_ID = "${{ steps.create_release.outputs.id }}"
          }
          echo "release-id=$RELEASE_ID" >> $env:GITHUB_OUTPUT
          echo "Release ID: $RELEASE_ID"

      # Build Wails Application with Release ID
      - name: Build Wails Application
        id: build
        run: |
          # Add NSIS to PATH for this session
          $env:Path += ";C:\Program Files (x86)\NSIS;C:\Program Files\NSIS"
          
          # Gather build information
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          if ([string]::IsNullOrEmpty($VERSION)) { $VERSION = "dev" }
          
          $BUILD_TIME = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $COMMIT_SHA = "${{ github.sha }}"
          $RELEASE_ID = "${{ steps.set_release_id.outputs.release-id }}"
          
          # Get app name from wails.json
          $wailsConfig = Get-Content wails.json | ConvertFrom-Json
          $appName = $wailsConfig.name
          
          Write-Host "Building with Release ID: $RELEASE_ID"
          
          # Build with UPX compression and inject variables
          wails build -platform windows/amd64 -nsis -upx `
            -ldflags "-X main.version=$VERSION -X main.buildTime=$BUILD_TIME -X main.commitSha=$COMMIT_SHA -X main.buildCommit=$RELEASE_ID"
          
          # Set output paths
          echo "binary-path=build/bin/$appName.exe" >> $env:GITHUB_OUTPUT
          echo "installer-path=build/bin/$appName-installer.exe" >> $env:GITHUB_OUTPUT
          
          # List artifacts for debugging
          Write-Host "Build artifacts:"
          dir build\bin

      # Upload assets to release
      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            ${{ steps.build.outputs.installer-path }}
            ${{ steps.build.outputs.binary-path }}
          body: |
            ## Changes in ${{ github.event.inputs.tag_name || github.ref_name }}

            - Built from commit: ${{ github.sha }}
            - Build date: ${{ github.run_number }}
            - Workflow: ${{ github.workflow }}
            - Release ID: ${{ steps.set_release_id.outputs.release-id }}
            - UPX Compression: Enabled
            - NSIS Installer: Included

            ### Download
            - `${{ steps.build.outputs.binary-path }}` - Application executable (UPX compressed)
            - `${{ steps.build.outputs.installer-path }}` - NSIS installer