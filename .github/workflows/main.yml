name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g., v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js (required for Wails)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'

      # Install UPX
      - name: Install UPX
        run: |
          choco install upx -y
          upx --version

      # Install NSIS
      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      # Install Wails CLI
      - name: Install Wails 
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "C:\ProgramData\chocolatey\lib\nsis" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          wails version

      # Wails Doctor
      - name: Check Wails Doctor
        run: |
          wails doctor

      # Get Release ID
      - name: Get Release ID
        id: get_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the tag name
          if ("${{ github.event.inputs.tag_name }}" -ne "") {
            $TAG_NAME = "${{ github.event.inputs.tag_name }}"
          } else {
            $TAG_NAME = "${{ github.ref_name }}"
          }
          
          # Get the release ID
          $RELEASE_ID = gh api repos/${{ github.repository }}/releases/tags/$TAG_NAME --jq '.id'
          
          # Fallback: If release doesn't exist yet, create it first
          if (-not $RELEASE_ID) {
            Write-Host "Release not found, creating a draft release first..."
            $RELEASE_ID = gh api repos/${{ github.repository }}/releases -X POST -f tag_name="$TAG_NAME" -f name="Release $TAG_NAME" -f draft=true --jq '.id'
          }
          
          echo "release-id=$RELEASE_ID" >> $env:GITHUB_OUTPUT
          echo "Release ID: $RELEASE_ID"

      # Build with Wails using UPX compression
      - name: Build Wails Application
        id: build
        run: |
          # Build the application with UPX compression
          wails build -platform windows/amd64 -nsis -upx -ldflags "-X main.buildCommit=$RELEASE_ID"
          
          # Set output paths
          echo "binary-path=build/bin/val-controller.exe" >> $env:GITHUB_OUTPUT
          echo "installer-path=build/bin/val-controller-amd64-installer.exe" >> $env:GITHUB_OUTPUT

      # Optional: Verify the build artifacts
      - name: List build artifacts
        run: |
          dir build\bin
          dir build\windows\installer

      # Create release with manual inputs or tag
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            ${{ steps.build.outputs.installer-path }}
            # ${{ steps.build.outputs.binary-path }}
          body: |
            ## Changes in ${{ github.event.inputs.tag_name || github.ref_name }}

            - Built from commit: ${{ github.sha }}
            - Build date: ${{ github.run_number }}
            - Workflow: ${{ github.workflow }}
            - UPX Compression: Enabled
            - NSIS Installer: Included

            ### Download
            # - `${{ steps.build.outputs.binary-path }}` - Application executable (UPX compressed)
            - `${{ steps.build.outputs.installer-path }}` - NSIS installer